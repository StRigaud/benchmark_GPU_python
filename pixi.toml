[workspace]
name = "benchmark"
version = "0.1.0"
description = "A minimalist Python library for benchmarking GPU operations comparing numpy, cupy, and pyclesperanto"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-64"]

[system-requirements]
cuda = "12" 

[tasks]
test = "pytest tests/ -v"
benchmark = "pytest tests/test_benchmarks.py -v --benchmark-only --benchmark-json=benchmark_results.json"
charts = "python -m benchmark.charts"
install = "pip install -e ."

[dependencies]
python = ">=3.12,<3.14"
numpy = "*"
pytest = "*"
pytest-benchmark = "*"
matplotlib = "*"
pandas = "*"
pip = "*"
scipy = "*"

[target.win-64.pypi-dependencies]
cupy-cuda12x = ">=14.0.1, <15"
pyclesperanto_cuda = ">=0.22.0"

[target.linux-64.pypi-dependencies]
cupy-cuda12x = ">=14.0.1, <15"
pyclesperanto_cuda = ">=0.22.0"

[target.osx-64.pypi-dependencies]
pyclesperanto_metal = ">=0.22.0"

[pypi-dependencies]
pyclesperanto = ">=0.22.0"
pyclesperanto_opencl = ">=0.22.0"


